name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev,api]"
      - name: Run ruff check
        run: ruff check hsrai/ urcm/ isre/
      - name: Run tests
        run: pytest hsrai/tests/ urcm/tests/ isre/tests/ -q --tb=short --timeout=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check hsrai/ urcm/ isre/
      - name: Run ruff format check
        run: ruff format --check hsrai/ urcm/ isre/

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t hsrai:${{ github.sha }} .
      - name: Run smoke test
        run: |
          docker run -d --name hsrai-test -p 8000:8000 \
            -e HSRAI_API_KEY=test-key \
            hsrai:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          curl -f -X POST http://localhost:8000/process \
            -H "Content-Type: application/json" \
            -H "X-API-Key: test-key" \
            -d '{"text": "test"}' || exit 1
          docker stop hsrai-test
          docker rm hsrai-test
